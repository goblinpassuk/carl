<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YubiKey Encrypted Notes</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .hidden { display: none; }
        textarea { width: 100%; height: 300px; font-family: monospace; padding: 0.5rem; }
        button { padding: 0.5rem 1rem; margin-right: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; }
        .status { padding: 0.5rem; margin: 1rem 0; border-radius: 4px; }
        .error { background: #fee; color: #c00; border: 1px solid #fcc; }
        .success { background: #efe; color: #060; border: 1px solid #cfc; }
        .info { background: #eef; color: #006; border: 1px solid #ccf; }
    </style>
</head>
<body>
    <h1>🔐 YubiKey Encrypted Notes</h1>
    
    <div id="status" class="status"></div>

    <div id="authSection">
        <button id="registerBtn">🔑 Register YubiKey</button>
        <button id="loginBtn">🔓 Unlock with YubiKey</button>
    </div>

    <div id="notesSection" class="hidden">
        <h2>Your Encrypted Notes</h2>
        <textarea id="noteContent" placeholder="Write your private notes here..."></textarea>
        <br>
        <button id="saveBtn">💾 Save (encrypted locally)</button>
        <button id="exportBtn">📎 Export & Save as Encrypted File</button>
        <button id="lockBtn">🔒 Lock & Clear</button>
    </div>

    <script src="yubikey-encrypted-notes.js"></script>
</body>
</html>
